<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Martin - RedRed Era</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff0033, #000);
      color: white;
      text-align: center;
    }.container {
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
  text-shadow: 0 0 10px red;
}

img {
  width: 250px;
  border-radius: 20px;
  margin: 20px 0;
  box-shadow: 0 0 20px red;
}

.question-box {
  margin-top: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 200px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  cursor: pointer;
  margin-left: 10px;
}

button:hover {
  background: darkred;
}

.result {
  margin-top: 20px;
  font-size: 1.2rem;
}

.score {
  margin-top: 10px;
  font-size: 1.5rem;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>🔥 Martin - RedRed Era 🔥</h1><img src="https://i.pinimg.com/originals/placeholder.jpg" id="martinImage">

<div class="question-box">
  <p id="question">Carregando pergunta...</p>
  <input type="text" id="answer" placeholder="Digite sua resposta">
  <button onclick="checkAnswer()">Enviar</button>
</div>

<div class="result" id="result"></div>
<div class="score" id="score">Pontos: 0</div>

  </div>  <script>
    const questions = [
      {
        q: "Qual é o nome do artista?",
        a: "martin"
      },
      {
        q: "Qual é a era do conceito?",
        a: "redred"
      },
      {
        q: "Ele é parte de qual grupo?",
        a: "cortis"
      },
      {
        q: "A estética é mais clara ou escura?",
        a: "escura"
      }
    ];

    let current = 0;
    let score = 0;

    function loadQuestion() {
      document.getElementById("question").innerText = questions[current].q;
    }

    function checkAnswer() {
      const userAnswer = document.getElementById("answer").value.toLowerCase();

      if (userAnswer.includes(questions[current].a)) {
        document.getElementById("result").innerText = "✔️ Acertou!";
        score++;
      } else {
        document.getElementById("result").innerText = "❌ Errou!";
      }

      document.getElementById("score").innerText = "Pontos: " + score;

      current++;
      document.getElementById("answer").value = "";

      if (current < questions.length) {
        loadQuestion();
      } else {
        document.getElementById("question").innerText = "Fim do jogo!";
      }
    }

    loadQuestion();

    // Trocar imagem automaticamente (simulando RedRed vibes)
    document.getElementById("martinImage").src = "https://pin.it/8Y7AhQ4NF";
  </script></body>
</html>
