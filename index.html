<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>martin.exe</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  font-size: 12px;
}

/* fundo 2000s quebrado */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://pin.it/8Y7AhQ4NF");
  opacity: 0.2;
  z-index: -1;
}

/* título */
h1 {
  color: red;
  text-shadow: 0 0 5px red;
}

/* layout simples */
.container {
  padding: 10px;
}

.box {
  border: 2px solid red;
  padding: 8px;
  margin-bottom: 10px;
  background: rgba(255,0,0,0.1);
}

/* imagem */
img {
  width: 250px;
  filter: contrast(120%) saturate(0.8);
}

/* botão feio anos 2000 */
button {
  background: #111;
  color: red;
  border: 1px solid red;
  padding: 5px;
  font-size: 12px;
  cursor: pointer;
}

/* glitch */
.glitch {
  animation: glitch 0.1s infinite;
}

@keyframes glitch {
  0% { transform: translate(1px,0); }
  50% { transform: translate(-1px,1px); }
  100% { transform: translate(1px,-1px); }
}

/* texto piscando */
.blink {
  animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

<h1>martin.exe</h1>
<p>sleeping on the chaos</p>

<img src="https://pin.it/8Y7AhQ4NF">

<div class="box">
<b>about martin</b>
<p>
Ele observa.  
Ele não responde tudo.  
E quanto mais você insiste... mais ele aparece.
</p>
</div>

<div class="box">
<b>status</b>
<p id="status">martin is near</p>
</div>

<!-- GAME -->
<div class="box">
<b>DON'T CLICK</b>

<p id="gameText">do not click the button</p>

<button id="btn">do not click</button>

<p>errors: <span id="score">0</span></p>
</div>

</div>

<script>
let score = 0;

const text = document.getElementById("gameText");
const scoreDisplay = document.getElementById("score");
const btn = document.getElementById("btn");

btn.onclick = () => {
  score++;
  scoreDisplay.innerText = score;

  if (score === 1) text.innerText = "i said don't click";
  if (score === 3) text.innerText = "why are you doing this";
  if (score === 5) text.innerText = "stop.";
  if (score === 7) {
    text.innerText = "martin is watching";
    document.body.classList.add("glitch");
  }
  if (score === 10) {
    text.innerText = "this is not a game anymore";
    text.classList.add("blink");
  }
  if (score === 13) {
    const img = document.createElement("img");
    img.src = "https://i.imgur.com/8Km9tLL.jpg";
    img.style.position = "fixed";
    img.style.width = "300px";
    img.style.top = "20%";
    img.style.left = "30%";
    img.style.opacity = "0.3";
    document.body.appendChild(img);
  }
  if (score === 16) {
    document.body.style.background = "darkred";
    text.innerText = "too late";
  }
  if (score > 20) {
    text.innerText = "martin.exe has stopped responding";
  }
};
</script>

</body>
</html>
