<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CORTIS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <img src="https://i.imgur.com/8Km9tLL.jpg" class="hero">

  <h1 class="title">your sign to know cortis..</h1>

  <div class="buttons">
    <button onclick="changeText()">INFO</button>
    <button onclick="glitch()">GLITCH</button>
    <button onclick="darkMode()">B&W</button>
    <button onclick="reset()">RESET</button>
  </div>

  <p id="info">
    Cortis é um conceito estético e emocional ligado a intensidade,
    caos bonito, vibes sombrias e identidade digital.
  </p>

</div>

<script src="script.js"></script>
</body>
</html>

<style>

body {
  background: #111;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.container {
  margin-top: 30px;
}

.hero {
  width: 300px;
  filter: hue-rotate(200deg) brightness(0.8);
  border-radius: 10px;
}

.title {
  font-size: 28px;
  margin: 15px;
  text-shadow: 0 0 10px blue;
}

.buttons button {
  margin: 5px;
  padding: 10px;
  background: linear-gradient(to right, #444, #888);
  border: none;
  color: white;
  cursor: pointer;
}

.buttons button:hover {
  background: linear-gradient(to right, #666, #aaa);
}

#info {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}

.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  100% { transform: translate(2px, 2px); }
}

  </style>

<script>
  function changeText() {
  document.getElementById("info").innerText =
    "Cortis = estética + sentimento + identidade. Meio dark, meio caótico, meio você.";
}

function glitch() {
  document.body.classList.toggle("glitch");
}

function darkMode() {
  document.body.style.filter = "grayscale(100%) contrast(120%)";
}

function reset() {
  document.body.classList.remove("glitch");
  document.body.style.filter = "none";
}
</script>
